name: Phase 5 format once

on:
  push:
    branches:
      - agent/phase-5-answer-kernel

permissions:
  contents: write

jobs:
  format:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/phase-5-answer-kernel
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - run: npm install
      - run: npx prettier --write packages/answer docs/phase-5
      - name: Commit formatting
        shell: bash
        run: |
          if git diff --quiet; then
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add packages/answer docs/phase-5
          git commit -m "Format Phase 5 answer kernel"
          git push origin HEAD:agent/phase-5-answer-kernel
