name: Phase 3 Excel buffer autofix

on:
  push:
    branches: [agent/phase-3-evidence-ingestion]

permissions:
  contents: write

jobs:
  patch:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/phase-3-evidence-ingestion
      - name: Use an explicit ArrayBuffer for ExcelJS
        run: |
          python - <<'PY'
          from pathlib import Path
          path = Path('apps/extractor/src/extractors.ts')
          text = path.read_text().replace(
              "  await workbook.xlsx.load(Buffer.from(input.bytes));",
              "  const excelBuffer = new ArrayBuffer(input.bytes.byteLength);\n  new Uint8Array(excelBuffer).set(input.bytes);\n  await workbook.xlsx.load(excelBuffer);",
          )
          path.write_text(text)
          PY
      - name: Commit fix
        run: |
          if git diff --quiet; then exit 0; fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add apps/extractor/src/extractors.ts
          git commit -m "Use explicit ArrayBuffer for Excel extraction"
          git push origin HEAD:agent/phase-3-evidence-ingestion
