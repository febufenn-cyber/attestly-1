name: Phase 3 TypeScript autofix

on:
  push:
    branches: [agent/phase-3-evidence-ingestion]

permissions:
  contents: write

jobs:
  patch:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/phase-3-evidence-ingestion
      - name: Apply deterministic library-contract fixes
        run: |
          python - <<'PY'
          from pathlib import Path

          path = Path('apps/extractor/src/extractors.ts')
          text = path.read_text()
          text = text.replace("    isEvalSupported: false,\n", "")
          text = text.replace("} as const;", "};", 1)
          text = text.replace(
              "  const buffer = input.bytes.buffer.slice(\n    input.bytes.byteOffset,\n    input.bytes.byteOffset + input.bytes.byteLength,\n  );\n  await workbook.xlsx.load(buffer);",
              "  await workbook.xlsx.load(Buffer.from(input.bytes));",
          )
          path.write_text(text)

          path = Path('apps/extractor/src/server.ts')
          text = path.read_text().replace("    body: bytes,", "    body: Buffer.from(bytes),")
          path.write_text(text)

          path = Path('apps/ingestion/src/index.ts')
          text = path.read_text()
          text = text.replace("  retryDelaySeconds,\n", "")
          anchor = "} from '../../../packages/evidence/src/index';\n"
          text = text.replace(
              anchor,
              anchor + "import { retryDelaySeconds } from '../../../packages/foundation/src/index';\n",
              1,
          )
          path.write_text(text)

          path = Path('packages/evidence/src/index.ts')
          text = path.read_text().replace(
              "  const digest = await crypto.subtle.digest('SHA-256', bytes);",
              "  const digestBytes = Uint8Array.from(bytes);\n  const digest = await crypto.subtle.digest('SHA-256', digestBytes.buffer);",
          )
          path.write_text(text)
          PY
      - name: Commit fixes
        run: |
          if git diff --quiet; then
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add apps/extractor/src/extractors.ts apps/extractor/src/server.ts apps/ingestion/src/index.ts packages/evidence/src/index.ts
          git commit -m "Fix Phase 3 TypeScript library boundaries"
          git push origin HEAD:agent/phase-3-evidence-ingestion
