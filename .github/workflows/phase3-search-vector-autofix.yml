name: Phase 3 search vector autofix

on:
  push:
    branches: [agent/phase-3-evidence-ingestion]

permissions:
  contents: write

jobs:
  patch:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/phase-3-evidence-ingestion
      - name: Use immutable normalized span text for generated search vectors
        run: |
          python - <<'PY'
          from pathlib import Path
          path = Path('supabase/migrations/202607120003_phase3_evidence_schema.sql')
          text = path.read_text().replace(
              "  search_document tsvector generated always as (\n    setweight(to_tsvector('english', coalesce(array_to_string(heading_path, ' '), '')), 'A')\n    || setweight(to_tsvector('english', coalesce(normalized_text, '')), 'B')\n  ) stored,",
              "  search_document tsvector generated always as (\n    setweight(to_tsvector('english'::regconfig, coalesce(normalized_text, '')), 'B')\n  ) stored,",
          )
          path.write_text(text)
          PY
      - name: Commit fix
        run: |
          if git diff --quiet; then exit 0; fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add supabase/migrations/202607120003_phase3_evidence_schema.sql
          git commit -m "Use immutable evidence search-vector expression"
          git push origin HEAD:agent/phase-3-evidence-ingestion
