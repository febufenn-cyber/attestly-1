name: Phase 4 protection typing fix

on:
  push:
    branches: [agent/phase-4-questionnaire-intelligence]

permissions:
  contents: write

jobs:
  patch:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/phase-4-questionnaire-intelligence
      - name: Apply narrow ExcelJS model adapter
        shell: python
        run: |
          from pathlib import Path
          path = Path('apps/questionnaire-processor/src/processor.ts')
          text = path.read_text()
          old_one = "if (worksheet.model.sheetProtection) inventory.protectedSheets.push(worksheet.name);"
          new_one = "if (Boolean((worksheet.model as unknown as { sheetProtection?: unknown }).sheetProtection)) inventory.protectedSheets.push(worksheet.name);"
          old_two = "const protectedDestination = Boolean(worksheet.model.sheetProtection && answerCell?.protection.locked !== false);"
          new_two = "const protectedDestination = Boolean((worksheet.model as unknown as { sheetProtection?: unknown }).sheetProtection && answerCell?.protection.locked !== false);"
          assert text.count(old_one) == 1
          assert text.count(old_two) == 1
          path.write_text(text.replace(old_one, new_one).replace(old_two, new_two))
      - name: Commit protection adapter
        run: |
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add apps/questionnaire-processor/src/processor.ts
          git commit -m "Fix ExcelJS worksheet protection typing"
          git push
