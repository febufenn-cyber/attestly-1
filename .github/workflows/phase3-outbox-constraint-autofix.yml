name: Phase 3 outbox constraint autofix

on:
  push:
    branches: [agent/phase-3-evidence-ingestion]

permissions:
  contents: write

jobs:
  patch:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/phase-3-evidence-ingestion
      - name: Name and target the evidence outbox uniqueness constraint
        run: |
          python - <<'PY'
          from pathlib import Path
          schema = Path('supabase/migrations/202607120003_phase3_evidence_schema.sql')
          text = schema.read_text().replace(
              "  unique (tenant_id, job_id),\n  constraint evidence_outbox_job_fk",
              "  constraint evidence_queue_outbox_job_unique unique (tenant_id, job_id),\n  constraint evidence_outbox_job_fk",
          )
          schema.write_text(text)

          lifecycle = Path('supabase/migrations/202607120005_phase3_evidence_lifecycle.sql')
          text = lifecycle.read_text().replace(
              "  on conflict (tenant_id, job_id) do update set available_at = now(), dispatched_at = null",
              "  on conflict on constraint evidence_queue_outbox_job_unique do update set available_at = now(), dispatched_at = null",
          )
          lifecycle.write_text(text)
          PY
      - name: Commit fix
        run: |
          if git diff --quiet; then exit 0; fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add supabase/migrations/202607120003_phase3_evidence_schema.sql supabase/migrations/202607120005_phase3_evidence_lifecycle.sql
          git commit -m "Disambiguate evidence outbox conflict handling"
          git push origin HEAD:agent/phase-3-evidence-ingestion
