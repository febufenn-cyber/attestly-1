name: Phase 5 generation fixture fix 2

on:
  push:
    branches:
      - agent/phase-5-generation-domain

permissions:
  contents: write

jobs:
  fix:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/phase-5-generation-domain
      - name: Correct temporary ID fixture and expected denial
        shell: bash
        run: |
          python - <<'PY'
          from pathlib import Path
          path = Path('supabase/tests/004_phase5_generation.sql')
          text = path.read_text()
          marker = "grant select, insert, update on phase5_ids to authenticated;\n"
          if marker not in text:
              raise SystemExit('temporary table grant not found')
          text = text.replace(marker, marker + "insert into phase5_ids default values;\n", 1)
          old = """  '23503', null,
  'Composite tenant keys reject a cross-tenant candidate'
"""
          new = """  '23514', 'Candidate span and evidence version do not match',
  'Candidate validation rejects a cross-tenant span before persistence'
"""
          if old not in text:
              raise SystemExit('cross-tenant expectation not found')
          path.write_text(text.replace(old, new, 1))
          PY
      - name: Commit correction
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add supabase/tests/004_phase5_generation.sql
          git commit -m "Fix Phase 5 generation ledger fixture"
          git push origin HEAD:agent/phase-5-generation-domain
