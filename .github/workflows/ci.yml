name: CI

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  application:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Install dependencies
        run: npm install
      - name: Format
        run: npm run format:check
      - name: Typecheck
        run: |
          npm run typecheck > typecheck.log 2>&1 || {
            cat typecheck.log
            exit 1
          }
      - name: Upload typecheck diagnostics
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: typecheck-diagnostics
          path: typecheck.log
          if-no-files-found: ignore
          retention-days: 3
      - name: Unit tests
        run: npm run test
      - name: Build all deployable applications
        run: npm run build
      - name: Production dependency audit
        run: npm audit --omit=dev --audit-level=high

  database:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Install Supabase CLI
        run: npm install
      - name: Start isolated local Supabase
        run: npx supabase start
      - name: Rebuild database from migrations
        run: npx supabase db reset
      - name: Run pgTAP tenant-isolation tests
        run: npx supabase test db
      - name: Stop local Supabase
        if: always()
        run: npx supabase stop --no-backup
