name: CI

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: write

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  phase5-evaluation-repair:
    if: github.head_ref == 'agent/phase-5-console-evaluation' && github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/phase-5-console-evaluation
          token: ${{ secrets.GITHUB_TOKEN }}
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - run: npm install
      - name: Allow mismatch evidence only as a limiting citation
        shell: bash
        run: |
          python - <<'PY'
          from pathlib import Path
          path = Path('packages/answer/src/index.ts')
          text = path.read_text()
          old = """      if (candidate.scopeMatch === 'mismatch') {
        errors.push(`scope_mismatched_citation:${output.claimLocalId}:${spanId}`);
      }
"""
          new = """      if (
        candidate.scopeMatch === 'mismatch' &&
        output.disposition !== 'scope_mismatch'
      ) {
        errors.push(`scope_mismatched_citation:${output.claimLocalId}:${spanId}`);
      }
"""
          if old not in text:
            raise SystemExit('scope mismatch validator target not found')
          path.write_text(text.replace(old, new, 1))
          PY
          npx prettier --write packages/answer/src/index.ts packages/answer/src/evaluation.ts packages/answer/src/evaluation.test.ts
          npm run typecheck
          npm run test
          npm run eval:phase5
      - name: Commit correction
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add packages/answer/src/index.ts packages/answer/src/evaluation.ts packages/answer/src/evaluation.test.ts
          git commit -m "Fix Phase 5 limiting citations and attack metrics"
          git push origin HEAD:agent/phase-5-console-evaluation

  application:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Install dependencies
        run: npm install
      - name: Format
        run: npm run format:check
      - name: Typecheck
        run: |
          npm run typecheck > typecheck.log 2>&1 || {
            cat typecheck.log
            exit 1
          }
      - name: Upload typecheck diagnostics
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: typecheck-diagnostics
          path: typecheck.log
          if-no-files-found: ignore
          retention-days: 3
      - name: Unit tests
        run: |
          npm run test > test.log 2>&1 || {
            cat test.log
            exit 1
          }
      - name: Upload test diagnostics
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: test-diagnostics
          path: test.log
          if-no-files-found: ignore
          retention-days: 3
      - name: Phase 5 adversarial evaluation
        if: always()
        run: |
          npm run eval:phase5 > phase5-evaluation.log 2>&1 || {
            cat phase5-evaluation.log
            exit 1
          }
      - name: Upload Phase 5 evaluation report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: phase5-evaluation-report
          path: reports/phase5-evaluation-report.json
          if-no-files-found: error
          retention-days: 14
      - name: Build all deployable applications
        run: |
          npm run build > build.log 2>&1 || {
            cat build.log
            exit 1
          }
      - name: Upload build diagnostics
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: build-diagnostics
          path: build.log
          if-no-files-found: ignore
          retention-days: 3
      - name: Production dependency audit
        run: npm audit --omit=dev --audit-level=high

  database:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Install Supabase CLI
        run: npm install
      - name: Start isolated local Supabase
        run: |
          npx supabase start -x studio,imgproxy,edge-runtime,logflare,vector,realtime,inbucket > database-start.log 2>&1 || {
            cat database-start.log
            exit 1
          }
      - name: Rebuild database from migrations
        run: |
          npx supabase db reset > database-reset.log 2>&1 || {
            cat database-reset.log
            exit 1
          }
      - name: Run pgTAP tenant-isolation tests
        run: |
          npx supabase test db > database-test.log 2>&1 || {
            cat database-test.log
            exit 1
          }
      - name: Upload database diagnostics
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: database-diagnostics
          path: |
            database-start.log
            database-reset.log
            database-test.log
          if-no-files-found: ignore
          retention-days: 3
      - name: Stop local Supabase
        if: always()
        run: npx supabase stop --no-backup
