name: Phase 4 snapshot test correction

on:
  push:
    branches: [agent/phase-4-questionnaire-intelligence]

permissions:
  contents: write

jobs:
  patch:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/phase-4-questionnaire-intelligence
      - name: Require hard snapshot mutation denial
        shell: python
        run: |
          from pathlib import Path
          path = Path('supabase/tests/003_phase4_questionnaire.sql')
          text = path.read_text()
          old = "select throws_ok(\n  $$update public.questionnaire_snapshots set snapshot_hash = repeat('d',64)$$,\n  '42501',\n  'Frozen questionnaire snapshot identity is immutable',\n  'Snapshot identity cannot be changed after freezing'\n);"
          new = "select throws_ok(\n  $$update public.questionnaire_snapshots set snapshot_hash = repeat('d',64)$$,\n  '42501',\n  null,\n  'Authenticated users receive a hard denial when attempting to mutate a frozen snapshot'\n);"
          assert text.count(old) == 1
          path.write_text(text.replace(old, new))
      - name: Commit corrected security assertion
        run: |
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add supabase/tests/003_phase4_questionnaire.sql
          git commit -m "Require hard snapshot mutation denial"
          git push
