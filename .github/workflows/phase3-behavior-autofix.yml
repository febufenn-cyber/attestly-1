name: Phase 3 behavior autofix

on:
  push:
    branches: [agent/phase-3-evidence-ingestion]

permissions:
  contents: write

jobs:
  patch:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/phase-3-evidence-ingestion
      - name: Preserve paragraph boundaries and detect system-instruction injection
        run: |
          python - <<'PY'
          from pathlib import Path
          path = Path('packages/evidence/src/index.ts')
          text = path.read_text()
          text = text.replace(
              ".replace(/\\s*\\n\\s*/g, '\\n')",
              ".replace(/[ \\t]*\\n[ \\t]*/g, '\\n')",
          )
          text = text.replace(
              "pattern: /ignore (all|any|the)?\\s*(previous|prior|system|developer) instructions?/i,",
              "pattern: /ignore\\s+(?:all\\s+|any\\s+|the\\s+)?(?:previous|prior|system|developer)(?:\\s+(?:system|developer))?\\s+instructions?/i,",
          )
          path.write_text(text)
          PY
      - name: Commit fixes
        run: |
          if git diff --quiet; then exit 0; fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add packages/evidence/src/index.ts
          git commit -m "Preserve evidence paragraphs and detect injection phrasing"
          git push origin HEAD:agent/phase-3-evidence-ingestion
