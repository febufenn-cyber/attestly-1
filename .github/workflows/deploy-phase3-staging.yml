name: Deploy Phase 3 staging

on:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: attestly-phase3-staging
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 35
    environment: staging
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Install dependencies
        run: npm install
      - name: Verify stack
        run: npm run check
      - name: Link staging Supabase
        run: npx supabase link --project-ref "${{ secrets.SUPABASE_PROJECT_REF }}"
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
          SUPABASE_DB_PASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}
      - name: Apply reviewed migrations
        run: npx supabase db push
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
          SUPABASE_DB_PASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}
      - name: Configure Evidence API secrets
        shell: bash
        run: |
          printf '%s' "$SUPABASE_URL" | npx wrangler secret put SUPABASE_URL --config apps/evidence-api/wrangler.jsonc --env staging
          printf '%s' "$SUPABASE_ANON_KEY" | npx wrangler secret put SUPABASE_ANON_KEY --config apps/evidence-api/wrangler.jsonc --env staging
          printf '%s' "$SUPABASE_SERVICE_ROLE_KEY" | npx wrangler secret put SUPABASE_SERVICE_ROLE_KEY --config apps/evidence-api/wrangler.jsonc --env staging
          printf '%s' "$SUPABASE_PROJECT_REF" | npx wrangler secret put EXPECTED_SUPABASE_PROJECT_REF --config apps/evidence-api/wrangler.jsonc --env staging
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          SUPABASE_PROJECT_REF: ${{ secrets.SUPABASE_PROJECT_REF }}
      - name: Configure ingestion secrets
        shell: bash
        run: |
          printf '%s' "$SUPABASE_URL" | npx wrangler secret put SUPABASE_URL --config apps/ingestion/wrangler.jsonc --env staging
          printf '%s' "$SUPABASE_SERVICE_ROLE_KEY" | npx wrangler secret put SUPABASE_SERVICE_ROLE_KEY --config apps/ingestion/wrangler.jsonc --env staging
          printf '%s' "$SUPABASE_PROJECT_REF" | npx wrangler secret put EXPECTED_SUPABASE_PROJECT_REF --config apps/ingestion/wrangler.jsonc --env staging
          printf '%s' "$EXTRACTOR_INTERNAL_TOKEN" | npx wrangler secret put EXTRACTOR_INTERNAL_TOKEN --config apps/ingestion/wrangler.jsonc --env staging
          printf '%s' "$EXTRACTOR_URL" | npx wrangler secret put EXTRACTOR_URL --config apps/ingestion/wrangler.jsonc --env staging
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          SUPABASE_PROJECT_REF: ${{ secrets.SUPABASE_PROJECT_REF }}
          EXTRACTOR_INTERNAL_TOKEN: ${{ secrets.EXTRACTOR_INTERNAL_TOKEN }}
          EXTRACTOR_URL: ${{ vars.EXTRACTOR_URL }}
      - name: Deploy evidence API and ingestion worker
        run: |
          npx wrangler deploy --config apps/evidence-api/wrangler.jsonc --env staging
          npx wrangler deploy --config apps/ingestion/wrangler.jsonc --env staging
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
      - name: Build and deploy evidence console
        run: |
          npm run build:evidence-console
          npx wrangler deploy --config apps/evidence-console/wrangler.jsonc --env staging
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          VITE_SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
          VITE_EVIDENCE_API_URL: ${{ vars.EVIDENCE_API_URL }}
