name: Phase 4 compiler autofix

on:
  push:
    branches: [agent/phase-4-questionnaire-intelligence]
  pull_request:
    types: [opened, synchronize, reopened]

permissions:
  contents: write

jobs:
  patch:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/phase-4-questionnaire-intelligence
      - name: Apply deterministic compiler corrections
        shell: python
        run: |
          from pathlib import Path

          def patch(path, old, new, expected=1):
              p = Path(path)
              text = p.read_text()
              count = text.count(old)
              assert count == expected, f"{path}: expected {expected} matches, found {count}"
              p.write_text(text.replace(old, new))

          patch(
              'apps/questionnaire-processor/src/processor.ts',
              "  QuestionnaireQuestionSchema,\n  classifyPackageDiff,",
              "  QuestionnaireQuestionSchema,\n  StructuralInventorySchema,\n  classifyPackageDiff,",
          )
          patch(
              'apps/questionnaire-processor/src/processor.ts',
              "inventory.usedRanges[worksheet.name] = worksheet.dimensions;",
              "inventory.usedRanges[worksheet.name] = String(worksheet.dimensions);",
          )
          patch(
              'apps/questionnaire-processor/src/processor.ts',
              "if (worksheet.isProtected) inventory.protectedSheets.push(worksheet.name);",
              "if (worksheet.model.sheetProtection) inventory.protectedSheets.push(worksheet.name);",
          )
          patch(
              'apps/questionnaire-processor/src/processor.ts',
              "const protectedDestination = Boolean(worksheet.isProtected && answerCell?.protection.locked !== false);",
              "const protectedDestination = Boolean(worksheet.model.sheetProtection && answerCell?.protection.locked !== false);",
          )
          patch(
              'packages/questionnaire/src/index.ts',
              "  if (expression.operator === 'not') {\n    const value = evaluateCondition(expression.condition, answers);\n    return value === 'active' ? 'inactive' : value === 'inactive' ? 'active' : 'unknown';\n  }\n\n  const raw = answers[expression.questionLocalId];",
              "  if (expression.operator === 'not') {\n    const value = evaluateCondition(expression.condition, answers);\n    return value === 'active' ? 'inactive' : value === 'inactive' ? 'active' : 'unknown';\n  }\n  if (!('questionLocalId' in expression)) return 'unknown';\n\n  const raw = answers[expression.questionLocalId];",
          )
          patch(
              'supabase/tests/003_phase4_questionnaire.sql',
              'select plan(22);',
              'select plan(24);',
          )
      - name: Commit compiler corrections
        run: |
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add apps/questionnaire-processor/src/processor.ts packages/questionnaire/src/index.ts supabase/tests/003_phase4_questionnaire.sql
          git commit -m "Fix Phase 4 compiler and test contracts"
          git push
