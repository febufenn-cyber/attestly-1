name: Format remaining plan once

on:
  push:
    branches:
      - agent/remaining-implementation-plan

permissions:
  contents: write

jobs:
  format:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/remaining-implementation-plan
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - run: npm install
      - run: npx prettier --write docs/REMAINING_IMPLEMENTATION_PLAN.md
      - name: Commit formatting
        shell: bash
        run: |
          if git diff --quiet; then
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add docs/REMAINING_IMPLEMENTATION_PLAN.md
          git commit -m "Format remaining implementation plan"
          git push origin HEAD:agent/remaining-implementation-plan
