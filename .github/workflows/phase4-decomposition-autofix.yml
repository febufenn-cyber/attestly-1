name: Phase 4 compound decomposition fix

on:
  push:
    branches: [agent/phase-4-questionnaire-intelligence]

permissions:
  contents: write

jobs:
  patch:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/phase-4-questionnaire-intelligence
      - name: Split comma-led independent obligations
        shell: python
        run: |
          from pathlib import Path
          path = Path('packages/questionnaire/src/index.ts')
          text = path.read_text()
          old = ".split(/\\s*(?:,\\s*(?:and|or)\\s+|;\\s*|\\band\\b(?=\\s+(?:restrict|rotate|encrypt|review|monitor|retain|require|perform|provide|maintain|use|store|process))|\\bor\\b(?=\\s+(?:restrict|rotate|encrypt|review|monitor|retain|require|perform|provide|maintain|use|store|process)))\\s*/i)"
          new = ".split(/\\s*(?:,\\s*(?:and|or)\\s+|,\\s*(?=(?:restrict|rotate|encrypt|review|monitor|retain|require|perform|provide|maintain|use|store|process)\\b)|;\\s*|\\band\\b(?=\\s+(?:restrict|rotate|encrypt|review|monitor|retain|require|perform|provide|maintain|use|store|process))|\\bor\\b(?=\\s+(?:restrict|rotate|encrypt|review|monitor|retain|require|perform|provide|maintain|use|store|process)))\\s*/i)"
          assert text.count(old) == 1
          path.write_text(text.replace(old, new))
      - name: Commit decomposition correction
        run: |
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add packages/questionnaire/src/index.ts
          git commit -m "Fix compound questionnaire decomposition"
          git push
