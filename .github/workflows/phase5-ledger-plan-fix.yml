name: Phase 5 ledger plan correction

on:
  push:
    branches:
      - agent/phase-5-generation-ledger-v2

permissions:
  contents: write

jobs:
  fix:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/phase-5-generation-ledger-v2
      - name: Correct pgTAP plan
        run: sed -i 's/select plan(24);/select plan(23);/' supabase/tests/004_phase5_generation.sql
      - name: Commit correction
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add supabase/tests/004_phase5_generation.sql
          git commit -m "Fix Phase 5 generation test plan"
          git push origin HEAD:agent/phase-5-generation-ledger-v2
