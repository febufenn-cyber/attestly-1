name: Phase 5 kernel type fix v2

on:
  push:
    branches:
      - agent/phase-5-answer-kernel

permissions:
  contents: write

jobs:
  fix:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/phase-5-answer-kernel
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Apply compiler fixes
        shell: bash
        run: |
          python - <<'PY'
          from pathlib import Path
          import re

          index_path = Path('packages/answer/src/index.ts')
          text = index_path.read_text()
          pattern = re.compile(
              r"    const citations: Citation\[\] = output\.citationSpanIds\n"
              r"(?:.*\n)*?"
              r"      \.filter\(\(citation\): citation is Citation => citation !== null\);\n",
          )
          replacement = """    const citations: Citation[] = [];
              for (const spanId of output.citationSpanIds) {
                const candidate = candidateById.get(spanId);
                const quote = output.citationQuotes[spanId];
                if (!candidate || !quote) continue;
                citations.push(
                  CitationSchema.parse({
                    spanId,
                    evidenceVersionId: candidate.evidenceVersionId,
                    role: candidate.contradiction ? 'contradicts' : 'supports',
                    quote,
                    claimLocalId: request.localId,
                  }),
                );
              }
          """
          text, count = pattern.subn(replacement, text, count=1)
          if count != 1:
              raise SystemExit(f'citation replacement count={count}')
          index_path.write_text(text)

          test_path = Path('packages/answer/src/index.test.ts')
          test_text = test_path.read_text()
          pattern_test = re.compile(
              r"      sourceLocation: \{ format: 'xlsx', sheetName: 'Security', cellRange: 'B12' \},\n"
          )
          replacement_test = """      sourceLocation: {
                format: 'xlsx',
                sheetName: 'Security',
                cellRange: 'B12',
                sectionPath: [],
                neighbouringLabels: [],
              },
          """
          test_text, count = pattern_test.subn(replacement_test, test_text, count=1)
          if count != 1:
              raise SystemExit(f'test replacement count={count}')
          test_path.write_text(test_text)
          PY
      - run: npm install
      - run: npx prettier --write packages/answer
      - name: Commit fixes
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add packages/answer
          git commit -m "Fix Phase 5 answer kernel types"
          git push origin HEAD:agent/phase-5-answer-kernel
