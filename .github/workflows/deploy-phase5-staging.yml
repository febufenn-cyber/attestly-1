name: Deploy Phase 5 staging

on:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: attestly-phase5-staging
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 35
    environment: staging
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Install dependencies
        run: npm install
      - name: Verify application, evaluation and builds
        run: npm run check
      - name: Link staging Supabase
        run: npx supabase link --project-ref "${{ secrets.SUPABASE_PROJECT_REF }}"
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
          SUPABASE_DB_PASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}
      - name: Apply reviewed migrations
        run: npx supabase db push
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
          SUPABASE_DB_PASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}
      - name: Configure answer API secrets
        shell: bash
        run: |
          printf '%s' "$SUPABASE_URL" | npx wrangler secret put SUPABASE_URL --config apps/answer-api/wrangler.jsonc --env staging
          printf '%s' "$SUPABASE_ANON_KEY" | npx wrangler secret put SUPABASE_ANON_KEY --config apps/answer-api/wrangler.jsonc --env staging
          printf '%s' "$SUPABASE_SERVICE_ROLE_KEY" | npx wrangler secret put SUPABASE_SERVICE_ROLE_KEY --config apps/answer-api/wrangler.jsonc --env staging
          printf '%s' "$SUPABASE_PROJECT_REF" | npx wrangler secret put EXPECTED_SUPABASE_PROJECT_REF --config apps/answer-api/wrangler.jsonc --env staging
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          SUPABASE_PROJECT_REF: ${{ secrets.SUPABASE_PROJECT_REF }}
      - name: Configure generation worker secrets
        shell: bash
        run: |
          printf '%s' "$SUPABASE_URL" | npx wrangler secret put SUPABASE_URL --config apps/generation-worker/wrangler.jsonc --env staging
          printf '%s' "$SUPABASE_SERVICE_ROLE_KEY" | npx wrangler secret put SUPABASE_SERVICE_ROLE_KEY --config apps/generation-worker/wrangler.jsonc --env staging
          printf '%s' "$SUPABASE_PROJECT_REF" | npx wrangler secret put EXPECTED_SUPABASE_PROJECT_REF --config apps/generation-worker/wrangler.jsonc --env staging
          printf '%s' "$ANTHROPIC_API_KEY" | npx wrangler secret put ANTHROPIC_API_KEY --config apps/generation-worker/wrangler.jsonc --env staging
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          SUPABASE_PROJECT_REF: ${{ secrets.SUPABASE_PROJECT_REF }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
      - name: Deploy Phase 5 API and worker
        run: |
          npx wrangler deploy --config apps/answer-api/wrangler.jsonc --env staging
          npx wrangler deploy --config apps/generation-worker/wrangler.jsonc --env staging
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
      - name: Build and deploy answer console
        run: |
          npm run build:answer-console
          npx wrangler deploy --config apps/answer-console/wrangler.jsonc --env staging
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          VITE_SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
          VITE_ANSWER_API_URL: ${{ vars.ANSWER_API_URL }}
