name: Phase 5 ledger failure status correction

on:
  push:
    branches:
      - agent/phase-5-generation-ledger-v2

permissions:
  contents: write

jobs:
  fix:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/phase-5-generation-ledger-v2
      - name: Cast failure statuses
        shell: bash
        run: |
          python - <<'PY'
          from pathlib import Path
          path = Path('supabase/migrations/202607130015_phase5_generation_lifecycle.sql')
          text = path.read_text()
          replacements = {
            "set status = case when p_retryable then 'failed_retryable' else 'failed_terminal' end,": "set status = case when p_retryable then 'failed_retryable'::public.generation_status else 'failed_terminal'::public.generation_status end,",
            "set status = case when p_retryable then 'failed_retryable' else 'failed_terminal' end,\n      last_error_code": "set status = case when p_retryable then 'failed_retryable'::public.job_status else 'failed_terminal'::public.job_status end,\n      last_error_code",
          }
          for old, new in replacements.items():
            if old not in text:
              raise SystemExit(f'target not found: {old}')
            text = text.replace(old, new, 1)
          path.write_text(text)
          PY
      - name: Commit correction
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add supabase/migrations/202607130015_phase5_generation_lifecycle.sql
          git commit -m "Fix Phase 5 failure status typing"
          git push origin HEAD:agent/phase-5-generation-ledger-v2
