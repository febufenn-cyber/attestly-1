name: Phase 3 retrieval insert autofix

on:
  push:
    branches: [agent/phase-3-evidence-ingestion]

permissions:
  contents: write

jobs:
  patch:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/phase-3-evidence-ingestion
      - name: Keep the retrieval audit insert separate from returned rows
        run: |
          python - <<'PY'
          from pathlib import Path
          path = Path('supabase/migrations/202607120006_phase3_evidence_search.sql')
          text = path.read_text().replace(
              "  return query\n  with eligible as (",
              "  with eligible as (",
              1,
          )
          path.write_text(text)
          PY
      - name: Commit fix
        run: |
          if git diff --quiet; then exit 0; fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add supabase/migrations/202607120006_phase3_evidence_search.sql
          git commit -m "Separate retrieval audit insert from result query"
          git push origin HEAD:agent/phase-3-evidence-ingestion
