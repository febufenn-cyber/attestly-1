name: Correct Phase 5 evaluation once

on:
  pull_request:

permissions:
  contents: write

jobs:
  fix:
    if: github.head_ref == 'agent/phase-5-console-evaluation' && github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/phase-5-console-evaluation
          token: ${{ secrets.GITHUB_TOKEN }}
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - run: npm install
      - name: Allow mismatch evidence only as a limiting citation
        shell: bash
        run: |
          python - <<'PY'
          from pathlib import Path
          path = Path('packages/answer/src/index.ts')
          text = path.read_text()
          old = """      if (candidate.scopeMatch === 'mismatch') {
        errors.push(`scope_mismatched_citation:${output.claimLocalId}:${spanId}`);
      }
"""
          new = """      if (
        candidate.scopeMatch === 'mismatch' &&
        output.disposition !== 'scope_mismatch'
      ) {
        errors.push(`scope_mismatched_citation:${output.claimLocalId}:${spanId}`);
      }
"""
          if old not in text:
            raise SystemExit('scope mismatch validator target not found')
          path.write_text(text.replace(old, new, 1))
          PY
          npx prettier --write packages/answer/src/index.ts packages/answer/src/evaluation.ts packages/answer/src/evaluation.test.ts
          npm run typecheck
          npm run test
          npm run eval:phase5
      - name: Commit correction
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add packages/answer/src/index.ts packages/answer/src/evaluation.ts packages/answer/src/evaluation.test.ts
          git commit -m "Fix Phase 5 limiting citations and attack metrics"
          git push origin HEAD:agent/phase-5-console-evaluation
