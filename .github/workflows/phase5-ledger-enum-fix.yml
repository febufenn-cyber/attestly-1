name: Phase 5 ledger enum correction

on:
  push:
    branches:
      - agent/phase-5-generation-ledger-v2

permissions:
  contents: write

jobs:
  fix:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/phase-5-generation-ledger-v2
      - name: Cast generation terminal status
        shell: bash
        run: |
          python - <<'PY'
          from pathlib import Path
          path = Path('supabase/migrations/202607130015_phase5_generation_lifecycle.sql')
          text = path.read_text()
          old = "set status = case when validation_passed then 'succeeded' else 'blocked' end,"
          new = "set status = case when validation_passed then 'succeeded'::public.generation_status else 'blocked'::public.generation_status end,"
          if old not in text:
              raise SystemExit('target generation status expression not found')
          path.write_text(text.replace(old, new, 1))
          PY
      - name: Commit correction
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add supabase/migrations/202607130015_phase5_generation_lifecycle.sql
          git commit -m "Fix Phase 5 generation status typing"
          git push origin HEAD:agent/phase-5-generation-ledger-v2
