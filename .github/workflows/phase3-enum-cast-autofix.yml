name: Phase 3 enum cast autofix

on:
  push:
    branches: [agent/phase-3-evidence-ingestion]

permissions:
  contents: write

jobs:
  patch:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/phase-3-evidence-ingestion
      - name: Cast conditional lifecycle and index states explicitly
        run: |
          python - <<'PY'
          from pathlib import Path
          path = Path('supabase/migrations/202607120005_phase3_evidence_lifecycle.sql')
          text = path.read_text()
          text = text.replace(
              "index_status = case when critical_count = 0 then 'ready' else 'not_indexed' end,",
              "index_status = case when critical_count = 0 then 'ready'::public.index_status else 'not_indexed'::public.index_status end,",
          )
          text = text.replace(
              "lifecycle_status = case when critical_count = 0 and quality >= 0.82 then 'ready_for_review' else 'extraction_review_required' end,",
              "lifecycle_status = case when critical_count = 0 and quality >= 0.82 then 'ready_for_review'::public.evidence_lifecycle_status else 'extraction_review_required'::public.evidence_lifecycle_status end,",
          )
          text = text.replace(
              "lifecycle_status = case when p_restricted then 'approved_restricted' else 'approved' end,",
              "lifecycle_status = case when p_restricted then 'approved_restricted'::public.evidence_lifecycle_status else 'approved'::public.evidence_lifecycle_status end,",
          )
          text = text.replace(
              "lifecycle_status = case when p_restricted then 'approved_restricted' else 'approved' end\n",
              "lifecycle_status = case when p_restricted then 'approved_restricted'::public.evidence_lifecycle_status else 'approved'::public.evidence_lifecycle_status end\n",
          )
          path.write_text(text)
          PY
      - name: Commit fix
        run: |
          if git diff --quiet; then exit 0; fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add supabase/migrations/202607120005_phase3_evidence_lifecycle.sql
          git commit -m "Cast conditional evidence enum states"
          git push origin HEAD:agent/phase-3-evidence-ingestion
