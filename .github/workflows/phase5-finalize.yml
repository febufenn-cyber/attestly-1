name: Finalize Phase 5 once

on:
  push:
    branches:
      - agent/phase-5-console-evaluation

permissions:
  contents: write

jobs:
  finalize:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/phase-5-console-evaluation
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - run: npm install
      - name: Update autonomous status ledger
        shell: bash
        run: |
          python - <<'PY'
          from pathlib import Path
          path = Path('docs/REMAINING_IMPLEMENTATION_PLAN.md')
          text = path.read_text()
          replacements = {
            '- Phase 5: evidence-grounded answer generation — in progress.': '- Phase 5: evidence-grounded answer generation — complete.',
            'Therefore, three full phases remain after Phase 5: Phases 6, 7, and 8. The unfinished remainder\nof Phase 5 must be completed first.': 'Therefore, three full phases remain: Phases 6, 7, and 8.',
            'The remaining implementation contains 17 delivery slices plus four phase exit reviews:\n\n- Three remaining Phase 5 slices.\n- Five Phase 6 slices.\n- Five Phase 7 slices.\n- Four Phase 8 slices.': 'The remaining implementation contains 14 delivery slices plus three phase exit reviews:\n\n- Five Phase 6 slices.\n- Five Phase 7 slices.\n- Four Phase 8 slices.',
            '- [ ] 5.2 Immutable generation ledger.': '- [x] 5.2 Immutable generation ledger.',
            '- [ ] 5.3 Retrieval and provider-neutral generation runtime.': '- [x] 5.3 Retrieval and provider-neutral generation runtime.',
            '- [ ] 5.4 Draft inspection console and evaluation harness.': '- [x] 5.4 Draft inspection console and evaluation harness.',
            '- [ ] Phase 5 exit review.': '- [x] Phase 5 exit review.',
            "## 13. First action after the next `build`\n\nInspect the current Phase 5 immutable-generation-ledger pull request.\n\n- If it is green, correct, current, and free of temporary artifacts, merge it and verify `main`.\n- If it is failing or stale, repair it on its branch, rerun every gate, merge it, and verify\n  `main`.\n- If it is unsafe to repair, close it with an explanation, reimplement Slice 5.2 from current\n  `main`, validate it, and merge it.\n\nOnly after Slice 5.2 is verified in `main` may Slice 5.3 begin.": "## 13. First action after the next `build`\n\nStart Phase 6 Slice 6.1 from the verified Phase 5 merge SHA. Implement the review domain and immutable human revisions, run every application, database, security, and Phase 6 gate, merge only a green pull request, and verify the resulting `main` SHA before Slice 6.2 begins.",
          }
          for old, new in replacements.items():
            if old not in text:
              raise SystemExit(f'status target not found: {old[:80]}')
            text = text.replace(old, new, 1)
          path.write_text(text)
          PY
      - name: Format final Phase 5 files
        run: |
          npx prettier --write \
            package.json \
            .env.example \
            .gitignore \
            .github/workflows/ci.yml \
            .github/workflows/deploy-phase5-staging.yml \
            apps/answer-console \
            packages/answer/src/evaluation.ts \
            packages/answer/src/evaluation-corpus.ts \
            packages/answer/src/evaluation.test.ts \
            scripts/run-phase5-evaluation.ts \
            README.md \
            docs/phase-5 \
            docs/REMAINING_IMPLEMENTATION_PLAN.md
      - name: Verify Phase 5 locally on runner
        run: |
          npm run typecheck
          npm run test
          npm run eval:phase5
          npm run build:answer-console
      - name: Commit finalization
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add package.json .env.example .gitignore .github/workflows/ci.yml .github/workflows/deploy-phase5-staging.yml apps/answer-console packages/answer scripts README.md docs
          git commit -m "Complete Phase 5 inspection and evaluation"
          git push origin HEAD:agent/phase-5-console-evaluation
