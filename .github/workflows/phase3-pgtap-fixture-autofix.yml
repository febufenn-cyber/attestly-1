name: Phase 3 pgTAP fixture autofix

on:
  push:
    branches: [agent/phase-3-evidence-ingestion]

permissions:
  contents: write

jobs:
  patch:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/phase-3-evidence-ingestion
      - name: Grant simulated authenticated role access to temporary IDs
        run: |
          python - <<'PY'
          from pathlib import Path
          path = Path('supabase/tests/002_phase3_evidence.sql')
          text = path.read_text().replace(
              "create temporary table phase3_ids (\n  evidence_document_id uuid,\n  evidence_version_id uuid,\n  job_id uuid,\n  outbox_id uuid\n);",
              "create temporary table phase3_ids (\n  evidence_document_id uuid,\n  evidence_version_id uuid,\n  job_id uuid,\n  outbox_id uuid\n);\ngrant select, insert, update on phase3_ids to authenticated;",
          )
          path.write_text(text)
          PY
      - name: Commit fix
        run: |
          if git diff --quiet; then exit 0; fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add supabase/tests/002_phase3_evidence.sql
          git commit -m "Grant pgTAP authenticated fixture access"
          git push origin HEAD:agent/phase-3-evidence-ingestion
