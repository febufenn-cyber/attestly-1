name: Format Phase 5 once

on:
  pull_request:

permissions:
  contents: write

jobs:
  format:
    if: github.head_ref == 'agent/phase-5-console-evaluation' && github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/phase-5-console-evaluation
          token: ${{ secrets.GITHUB_TOKEN }}
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - run: npm install
      - name: Apply repository formatting
        run: npx prettier --write .
      - name: Commit formatting
        run: |
          if git diff --quiet; then exit 0; fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Format final Phase 5 changes"
          git push origin HEAD:agent/phase-5-console-evaluation
