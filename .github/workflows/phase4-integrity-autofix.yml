name: Phase 4 integrity autofix

on:
  push:
    branches: [agent/phase-4-questionnaire-intelligence]

permissions:
  contents: write

jobs:
  patch:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/phase-4-questionnaire-intelligence
      - name: Preserve destination and atomic-request linkage
        shell: python
        run: |
          from pathlib import Path

          def replace_once(path, old, new):
              p = Path(path)
              text = p.read_text()
              count = text.count(old)
              assert count == 1, f"{path}: expected one match, found {count}"
              p.write_text(text.replace(old, new, 1))

          def replace_count(path, old, new, expected):
              p = Path(path)
              text = p.read_text()
              count = text.count(old)
              assert count == expected, f"{path}: expected {expected} matches, found {count}"
              p.write_text(text.replace(old, new))

          replace_once(
              'packages/questionnaire/src/index.ts',
              "export const AnswerDestinationSchema = z.object({\n  localId: z.string().min(1),\n  type:",
              "export const AnswerDestinationSchema = z.object({\n  localId: z.string().min(1),\n  questionLocalId: z.string().optional(),\n  type:",
          )

          replace_count(
              'apps/questionnaire-processor/src/processor.ts',
              "localId: destinationLocalId,\n        type:",
              "localId: destinationLocalId,\n        questionLocalId: localId,\n        type:",
              3,
          )

          replace_once(
              'apps/questionnaire-api/src/index.ts',
              "const [mapping, questions, destinations, conditions, instructions, warnings] = await Promise.all([",
              "const [mapping, questions, atomicRequests, destinations, conditions, instructions, warnings] = await Promise.all([",
          )
          replace_once(
              'apps/questionnaire-api/src/index.ts',
              "    client\n      .from('questionnaire_answer_destinations')",
              "    client\n      .from('questionnaire_atomic_requests')\n      .select('*')\n      .eq('tenant_id', tenantId)\n      .eq('mapping_version_id', mappingId)\n      .order('sequence'),\n    client\n      .from('questionnaire_answer_destinations')",
          )
          replace_once(
              'apps/questionnaire-api/src/index.ts',
              "const firstError = [mapping.error, questions.error, destinations.error, conditions.error, instructions.error, warnings.error].find(Boolean);",
              "const firstError = [mapping.error, questions.error, atomicRequests.error, destinations.error, conditions.error, instructions.error, warnings.error].find(Boolean);",
          )
          replace_once(
              'apps/questionnaire-api/src/index.ts',
              "    questions: questions.data ?? [],\n    destinations:",
              "    questions: questions.data ?? [],\n    atomicRequests: atomicRequests.data ?? [],\n    destinations:",
          )
          replace_once(
              'apps/questionnaire-api/src/index.ts',
              ".filter((destination) => destination.question_local_id === row.local_id || !destination.question_local_id)",
              ".filter((destination) => destination.question_local_id === row.local_id)",
          )

          replace_once(
              'apps/questionnaire-console/src/App.tsx',
              "type DestinationRow =",
              "type AtomicRequestRow = { id: string; question_local_id: string; local_id: string; sequence: number; original_clause: string; normalized_claim: string; qualifiers: string[]; materiality: string };\ntype DestinationRow =",
          )
          replace_once(
              'apps/questionnaire-console/src/App.tsx',
              "type MappingDetail = { mapping: Record<string, unknown>; questions: QuestionRow[]; destinations:",
              "type MappingDetail = { mapping: Record<string, unknown>; questions: QuestionRow[]; atomicRequests: AtomicRequestRow[]; destinations:",
          )
          replace_once(
              'apps/questionnaire-console/src/App.tsx',
              "        atomicRequests: [],\n        parentLocalId:",
              "        atomicRequests: detail.atomicRequests\n          .filter((request) => request.question_local_id === question.local_id)\n          .map((request) => ({\n            localId: request.local_id,\n            sequence: request.sequence,\n            originalClause: request.original_clause,\n            normalizedClaim: request.normalized_claim,\n            qualifiers: request.qualifiers ?? [],\n            materiality: request.materiality,\n          })),\n        parentLocalId:",
          )
      - name: Commit deterministic integrity patch
        run: |
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add packages/questionnaire/src/index.ts apps/questionnaire-processor/src/processor.ts apps/questionnaire-api/src/index.ts apps/questionnaire-console/src/App.tsx
          git commit -m "Preserve questionnaire destination and atomic claim linkage"
          git push
